# Ollama runs on the host for GPU access, not in Docker.
services:
  pipeline:
    build: .
    command: python -m src.pipeline
    volumes:
      - ./data/raw:/app/data/raw:ro
      - chroma_data:/app/chroma_db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    profiles:
      - ingest

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      # Disabled for security scans; override via compose.prod.yml for prod
      - SECURERAG_RATE_MODE=test

volumes:
  chroma_data:
